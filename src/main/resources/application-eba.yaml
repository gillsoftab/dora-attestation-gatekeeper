## EBA Verification Profile
## Activate with: --spring.profiles.active=eba
##
## This profile enables the EBA independent verification endpoints.
## These endpoints allow EBA to verify HSM attestation without
## requiring the entity's cooperation.

server:
  port: 8080

spring:
  application:
    name: hsm-attestation-reference

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    se.swish.hsm: DEBUG
